<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Login Page</title>

    <link rel="stylesheet" href="login.css">

</head>

<body>

    <div class="box">

        <h1>LOGIN</h1>

        <input type="text"
        id="voterId"
        placeholder="Enter Voter ID">

        <input type="password"
        id="securityCode"
        placeholder="Enter Password">

        <button class="login-btn"
        onclick="login()">

            Login

        </button>

    </div>

    <!-- BACK BUTTON -->
    <div class="back-btn">

        <button onclick="goHome()">

            Back

        </button>

    </div>

    <script src="login.js"></script>

</body>

</html>
