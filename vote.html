<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Vote Page</title>

    <link rel="stylesheet" href="vote.css">

</head>

<body>

    <div class="voting-machine">

        <h1>ONLINE VOTING</h1>

        <div class="vote-row">

            <div class="party-name">
                TVK
            </div>

            <div class="vote-section">

                <div class="light"></div>

                <button class="vote-btn"
                onclick="vote('TVK')">

                    Vote

                </button>

            </div>

        </div>

        <div class="vote-row">

            <div class="party-name">
                DMK
            </div>

            <div class="vote-section">

                <div class="light"></div>

                <button class="vote-btn"
                onclick="vote('DMK')">

                    Vote

                </button>

            </div>

        </div>

        <div class="vote-row">

            <div class="party-name">
                ADMK
            </div>

            <div class="vote-section">

                <div class="light"></div>

                <button class="vote-btn"
                onclick="vote('ADMK')">

                    Vote

                </button>

            </div>

        </div>

    </div>

    <script src="vote.js"></script>

</body>

</html>
